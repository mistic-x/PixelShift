        function applyLanguage() {
            let userLang = navigator.language.substring(0, 2);
            if (!translations[userLang]) userLang = 'en';
            const t = translations[userLang];
            document.title = t.title;
            document.getElementById('t-subtitle').textContent = t.subtitle;
            document.getElementById('file-name').textContent = t.dropzone;
            document.getElementById('t-select-placeholder').textContent = t.select;
            document.getElementById('convert-btn').textContent = t.btn;
            document.getElementById('loading').textContent = t.loading;
            document.getElementById('download-link').textContent = t.download;
            document.getElementById('t-seo').innerHTML = t.seo;
            document.getElementById('features-list').innerHTML = `
                <div class="feature-item"><h3>${t.f1_h}</h3><p>${t.f1_p}</p></div>
                <div class="feature-item"><h3>${t.f2_h}</h3><p>${t.f2_p}</p></div>
                <div class="feature-item"><h3>${t.f3_h}</h3><p>${t.f3_p}</p></div>`;
        }
        applyLanguage();

        // --- ЛОГІКА КОНВЕРТАЦІЇ ---
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const fileNameDisplay = document.getElementById('file-name');
        const fileSizeInfo = document.getElementById('file-size-info');
        const convertBtn = document.getElementById('convert-btn');
        const formatSelect = document.getElementById('format-select');
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const downloadLink = document.getElementById('download-link');
        const errorDiv = document.getElementById('error');

        ['dragover', 'dragleave', 'drop'].forEach(eName => {
            dropZone.addEventListener(eName, e => { e.preventDefault(); e.stopPropagation(); });
        });
        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => { if(fileInput.files[0]) handleFileSelect(fileInput.files[0]); });

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + ['Bytes', 'KB', 'MB', 'GB'][i];
        }

        async function handleFileSelect(file) {
            const ext = file.name.split('.').pop().toUpperCase();
            fileNameDisplay.textContent = `📄 ${file.name}`;
            fileNameDisplay.style.color = "#00cc66";
            fileSizeInfo.textContent = formatBytes(file.size);
            fileSizeInfo.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');

            const res = await fetch(`/api/get-allowed-formats?filename=${encodeURIComponent(file.name)}`);
            const data = await res.json();
            formatSelect.innerHTML = "";
            data.formats.forEach(fmt => {
                if (fmt !== ext && !(ext === "JPEG" && fmt === "JPG")) {
                    const opt = document.createElement('option');
                    opt.value = fmt; opt.textContent = `to ${fmt}`;
                    formatSelect.appendChild(opt);
                }
            });
        }

        convertBtn.addEventListener('click', async () => {
            if (!fileInput.files[0] || !formatSelect.value) return alert("Select file and format!");
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("target_format", formatSelect.value);

            loadingDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');
            convertBtn.disabled = true;

            try {
                const response = await fetch('/api/convert', { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Conversion failed");
                const blob = await response.blob();
                downloadLink.href = URL.createObjectURL(blob);
                downloadLink.download = `pixelshift_${fileInput.files[0].name.split('.')[0]}.${formatSelect.value.toLowerCase()}`;
                resultDiv.classList.remove('hidden');
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
            } finally {
                loadingDiv.classList.add('hidden');
                convertBtn.disabled = false;
            }
        });
    </script>
